<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utsho Fashion | Since 1998</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Inter:wght@300;400;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background-color: #fdfdfd;
        overflow-x: hidden; /* সাইড স্ক্রল বন্ধ রাখার জন্য */
      }

      .serif {
        font-family: "Playfair Display", serif;
      }

      /* কাস্টম স্ক্রলবার ডিজাইন (ঐচ্ছিক কিন্তু সুন্দর দেখাবে) */
      #cart-items-list::-webkit-scrollbar {
        width: 4px;
      }
      #cart-items-list::-webkit-scrollbar-thumb {
        background: #e5e7eb;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div
      id="cart-drawer"
      class="fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-[100] transform translate-x-full transition-transform duration-500 ease-in-out border-l border-gray-100"
    >
      <div class="p-8 h-full flex flex-col">
        <div class="flex justify-between items-center mb-10">
          <h2 class="serif text-2xl font-black italic text-gray-800">
            Your Shopping Bag
          </h2>
          <button
            onclick="closeCart()"
            class="text-3xl text-gray-400 hover:text-amber-800 transition duration-300"
          >
            &times;
          </button>
        </div>

        <div id="cart-items-list" class="flex-1 overflow-y-auto pr-2"></div>

        <div class="border-t border-gray-100 pt-6 mt-6">
          <div class="flex justify-between items-center mb-6">
            <span
              class="text-gray-400 font-bold uppercase text-[10px] tracking-widest"
            >
              Subtotal
            </span>
            <span class="text-2xl font-black text-gray-900">
              ৳ <span id="cart-total">0</span>
            </span>
          </div>

          <button
            class="w-full bg-black text-white py-5 rounded-2xl font-bold hover:bg-amber-900 transition shadow-lg shadow-black/10 active:scale-95"
          >
            Checkout Now
          </button>

          <p
            class="text-[10px] text-center text-gray-400 mt-4 uppercase tracking-tighter"
          >
            Tanzim Ahmed Utsho | Established 1998
          </p>
        </div>
      </div>
    </div>

    <script src="cart.js"></script>
    <script src="app.js"></script>
  </body>
</html>
